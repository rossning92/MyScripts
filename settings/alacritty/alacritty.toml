[general]
import = [
  "~/.config/alacritty/current-theme.toml",
  "~/AppData/Roaming/alacritty/current-theme.toml",
]

[selection]
save_to_clipboard = true

[mouse]
bindings = [
  { mouse = "Right", action = "Paste" },
]

[window.dimensions]
columns = 120
lines = 30

[window]
padding.x = 0
padding.y = 0

[keyboard]
bindings = [
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" },

  # Disable F1–F12 keys
  { key = "F1",  action = "None" },
  { key = "F2",  action = "None" },
  { key = "F3",  action = "None" },
  { key = "F4",  action = "None" },
  { key = "F5",  action = "None" },
  { key = "F6",  action = "None" },
  { key = "F7",  action = "None" },
  { key = "F8",  action = "None" },
  { key = "F9",  action = "None" },
  { key = "F10", action = "None" },
  { key = "F11", action = "None" },
  { key = "F12", action = "None" },
]
